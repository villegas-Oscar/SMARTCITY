<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityInsight | Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="auth-page">

  <main class="min-vh-100 d-flex align-items-center justify-content-center auth-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-11 col-md-9 col-lg-6">
          <div class="card auth-card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <div class="brand-badge mb-3">
                  <i class="bi bi-person-plus"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">Crea tu cuenta</h1>
                <p class="text-secondary mb-0">
                  Guarda tus preferencias y accede a tu panel ciudadano.
                </p>
              </div>

              <div id="registerAlert" class="alert alert-danger d-none" role="alert"></div>
              <div id="registerSuccess" class="alert alert-success d-none" role="alert"></div>

              <form id="registerForm" novalidate>
                <div class="mb-3">
                  <label for="name" class="form-label">Nombre completo</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="name"
                    placeholder="Tu nombre completo"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Correo electrónico</label>
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    id="email"
                    placeholder="ejemplo@correo.com"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label for="city" class="form-label">Ciudad favorita</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="city"
                    placeholder="Ej. León"
                  >
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="password"
                    placeholder="Mínimo 6 caracteres"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="confirmPassword"
                    placeholder="Repite tu contraseña"
                    required
                  >
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" id="registerBtn" class="btn btn-success btn-lg">
                    <i class="bi bi-person-check me-2"></i>
                    Crear cuenta
                  </button>
                </div>

                <div class="text-center">
                  <p class="mb-0 text-secondary">
                    ¿Ya tienes cuenta?
                    <a href="./login.html" class="fw-semibold text-decoration-none">Inicia sesión</a>
                  </p>
                </div>
              </form>
            </div>
          </div>

          <p class="text-center text-white-50 mt-3 mb-0 small">
            CityInsight · Plataforma Inteligente de Información Ciudadana
          </p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./assets/js/register.js"></script>
</body>
</html>

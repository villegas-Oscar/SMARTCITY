<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartCity - Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/CSS/styles.css">
    </head>
    <body class="auth-page">
        <main class="min-vh-100 d-flex align-items-center justify-content-center auth-wrapper">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                        <div class="card auth-card shadow-lg border-0">
                            <div class="card-body p-4 p-md-5">
                                <div class="text-center mb-4">
                                    <div class="brand-badge mb-3">
                                        <i class="bi bi-person-plus"></i>
                                    </div>
                                    <h1 class="h3 fw-bold mb-2">
                                        Crea tu cuenta
                                    </h1>
                                    <p class="text-secondary">
                                        guarda tus preferencias y accede a tu panel ciudadano
                                    </p>
                                </div>
                                <div id="registerAlert" class="alert alert-danger d-none">
                                </div>
                                <form id="registerForm" novalidate>
                                    <!-- Nombre completo-->
                                    <div class="mb-3">
                                        <label for="name" class="form-label">
                                            Nombre Completo
                                        </label>
                                        <input 
                                            type="text"
                                            class="form-control"
                                            id="name"
                                            required
                                        >        
                                    </div>
                                    <!-- Correo Electronico-->
                                    <div class="mb-3">
                                        <label for="email" class="form-label">
                                            Correo Electronico
                                        </label>
                                        <input 
                                            type="email"
                                            class="form-control"
                                            id="email"
                                            required
                                        >        
                                    </div>
                                    <!-- Ciudad Favorita-->
                                    <div class="mb-3">
                                        <label for="city" class="form-label">
                                            Ciudad Favorita
                                        </label>
                                        <input 
                                            type="text"
                                            class="form-control"
                                            id="city"
                                            required
                                        >        
                                    </div>
                                    <!-- Password-->
                                    <div class="mb-3">
                                        <label for="password" class="form-label">
                                            Password
                                        </label>
                                        <input 
                                            type="password"
                                            class="form-control"
                                            id="password"
                                            required
                                        >        
                                    </div>
                                    <!-- Confirm Password-->
                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">
                                            Confirm Password
                                        </label>
                                        <input 
                                            type="password"
                                            class="form-control"
                                            id="confirmPassword"
                                            required
                                        >        
                                    </div>

                                    <div class="d-grid mb-3">
                                        <button class="btn btn-primary btn-lg" type="submit">
                                            <i class="bi bi-person-check me-2"></i>
                                            Crear cuenta
                                        </button>
                                    </div>
                                    <div class="text-center">
                                        <p class="mb-0">
                                            Ya tienes cuenta?
                                            <a href="login.html" class="fw-semibold text-decoration-none" >Inicia sesion</a>
                                        </p>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <p class="text-center text-muted mt-3 small">
                            @ 2026 CitySmart
                        </p>
                    </div>
                </div>
            </div>
        </main>

        <!--
    <script src="./assets/js/app.js"></script>    
        -->
    
    <script type="module" src="./assets/js/register.js"></script>
    </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartCity - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/CSS/styles.css">
  </head>
  <body class="dashboard-page">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a href="#" class="navbar-brand fw-bold">
                <i class="bi bi-buildings me-2"></i>
                SmartCity
            </a>
            <div class="ms-auto">
                <button id="logoutBtn" class="btn btn-outline-light">
                    <i class="bi bi-box-arrow-right me-2"></i>
                    Cerrar Sesion
                </button>
            </div>
        </div>
    </nav>
    <!-- Contenido -->
    <div class="container py-5">
        <div class="mb-4">
            <h2 class="fw-bold">Bienvenido
                <span id="userName">Usuario</span>
            </h2>
            <p class="text-muted">
                Panel de informacion Ciudadana
            </p>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-info text-center">
                    <div class="card-body">
                        <i class="bi bi-cloud-sun display-5 text-primary mb-3"></i>
                        <h5 class="card-title">Clima</h5>
                        <p class="card-text">
                            Informacion Meteorologica en tiempo real
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-info text-center">
                    <div class="card-body">
                        <i class="bi bi-newspaper display-5 text-success mb-3"></i>
                        <h5 class="card-title">Noticias</h5>
                        <p class="card-text">
                            Noticias relevantes de tu ciudad
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-info text-center">
                    <div class="card-body">
                        <i class="bi bi-wind display-5 text-warning mb-3"></i>
                        <h5 class="card-title">Calidad del aire</h5>
                        <p class="card-text">
                            Indicadores ambientales
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/dashboard.js"></script>
  </body>
</html>

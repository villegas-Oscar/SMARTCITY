<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityInsight | Iniciar sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="auth-page">

  <main class="min-vh-100 d-flex align-items-center justify-content-center auth-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="card auth-card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <div class="brand-badge mb-3">
                  <i class="bi bi-buildings"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">Bienvenido a CityInsight</h1>
                <p class="text-secondary mb-0">
                  Accede para consultar información inteligente de tu ciudad.
                </p>
              </div>

              <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Correo electrónico</label>
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    id="loginEmail"
                    placeholder="ejemplo@correo.com"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Contraseña</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="loginPassword"
                    placeholder="••••••••"
                    required
                  >
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" id="loginBtn" class="btn btn-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Iniciar sesión
                  </button>
                </div>

                <div class="text-center">
                  <p class="mb-0 text-secondary">
                    ¿No tienes cuenta?
                    <a href="./register.html" class="fw-semibold text-decoration-none">Regístrate</a>
                  </p>
                </div>
              </form>
            </div>
          </div>

          <p class="text-center text-white-50 mt-3 mb-0 small">
            CityInsight · Plataforma Inteligente de Información Ciudadana
          </p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>

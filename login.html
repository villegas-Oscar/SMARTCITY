<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartCity - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/CSS/styles.css">
    </head>
    <body class="auth-page">
        <main class="min-vh-100 d-flex align-items-center justify-content-center auth-wrapper">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                        <div class="card auth-card shadow-lg border-0">
                            <div class="card-body p-4 p-md-5">
                                <div class="text-center mb-4">
                                    <div class="brand-badge mb-3">
                                        <i class="bi bi-buildings"></i>
                                    </div>
                                    <h1 class="h3 fw-bold mb-2">
                                        Welcome to SmartCity
                                    </h1>
                                    <p class="text-secondary">
                                        Accede para consultar informacion de tu ciudad
                                    </p>
                                </div>
                                <div id="loginAlert" class="alert alert-danger d-none">
                                </div>
                                <form id="loginForm" novalidate>
                                    <div class="mb-3">
                                        <label for="loginEmail" class="form-label">
                                            Correo Electronico
                                        </label>
                                        <input 
                                            type="email"
                                            class="form-control"
                                            id="loginEmail"
                                            required
                                        >        
                                    </div>
                                    <div class="mb-3">
                                        <label for="loginPassword" class="form-label">
                                            Password
                                        </label>
                                        <input 
                                            type="password"
                                            class="form-control"
                                            id="loginPassword"
                                            placeholder="**********"
                                            required
                                        >        
                                    </div>
                                    <div class="d-grid mb-3">
                                        <button class="btn btn-primary btn-lg" type="submit">
                                            <i class="bi bi-box-arrow-in-right me-2"></i>
                                            Iniciar sesion
                                        </button>
                                    </div>
                                    <div class="text-center">
                                        <p class="mb-0">
                                            No tienes una cuenta?
                                            <a href="register.html" class="fw-semibold text-decoration-none">Registrate</a>
                                        </p>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <p class="text-center text-muted mt-3 small">
                            @ 2026 CitySmart
                        </p>
                    </div>
                </div>
            </div>
        </main>

        <!--
    <script src="./assets/js/app.js"></script>        
        -->

    <script type="module" src="./assets/js/login.js"></script>
    </body>
</html>
